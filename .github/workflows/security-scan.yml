name: API Security Scan (self-hosted)

# Runs on a SELF-HOSTED runner on the machine where VAMPI is running, and scans
# the live local container at http://localhost:5000 (no fresh instance is built).
#   - BASELINE : OWASP ZAP, tuned (authenticated JWT + HIGH attack strength)
#   - FRAMEWORK: GenAI DAST framework, pulled as a GHCR image
#   - SCORING  : recall / precision / F1 vs the VAMPI ground truth
#
# Trigger with a push, or on demand:  gh workflow run security-scan.yml -R cheetooh/thesis-target

on:
  push:
  workflow_dispatch:

permissions:
  contents: read
  packages: read

env:
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  FRAMEWORK_IMAGE: ghcr.io/${{ github.repository_owner }}/thesis-framework:latest
  TARGET: http://localhost:5000

jobs:
  api-security-scan:
    runs-on: [self-hosted, docker]
    steps:
      - name: Checkout target (VAMPI)
        uses: actions/checkout@v4

      - name: Checkout thesis-framework (harness + scoring)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/thesis-framework
          path: .framework
          token: ${{ secrets.FRAMEWORK_TOKEN || github.token }}

      - name: Heal & verify the local VAMPI container
        run: |
          echo "Scanning the live container at $TARGET"
          # Restart the target first: VAMPI is a single-threaded dev server and the
          # framework's ReDoS test can leave a previous run's worker wedged. A
          # restart guarantees a clean, responsive server for this scan.
          docker restart vampi-vulnerable >/dev/null 2>&1 || true
          for i in $(seq 1 30); do
            curl -sf --max-time 10 "$TARGET/" >/dev/null && break
            echo "waiting for VAMPI ..."; sleep 2
          done
          curl -sf --max-time 15 "$TARGET/createdb" && echo " db seeded"

      # ---------- BASELINE: OWASP ZAP (tuned, authenticated) ----------
      - name: OWASP ZAP tuned scan
        run: |
          chmod +x .framework/benchmarks/zap/run-zap-scan.sh
          .framework/benchmarks/zap/run-zap-scan.sh \
            vampi-local "$TARGET/openapi.json" host "$TARGET"

      - name: Score ZAP
        run: |
          python3 .framework/scoring/score.py --tool zap --mode vulnerable \
            .framework/results/zap/vampi-local-latest/report.json --json > zap-vuln.json
          cat zap-vuln.json

      # ---------- FRAMEWORK: GenAI DAST (GHCR image) ----------
      - name: Pull GenAI framework image
        if: ${{ env.OPENAI_API_KEY != '' }}
        run: |
          # Pull the published image; fall back to the locally-cached image if the
          # registry copy is private/unavailable on this host.
          docker pull "$FRAMEWORK_IMAGE" || echo "registry pull failed; using local image cache"

      - name: Reset target before framework scan
        if: ${{ env.OPENAI_API_KEY != '' }}
        run: |
          # Give the GenAI run a clean, responsive target — the ZAP scan above may
          # have left the dev server in a degraded state, and this keeps the
          # framework's recorded scan duration a fair measurement.
          chmod +x .framework/benchmarks/reset-target.sh
          HEALTH_URL="$TARGET/" .framework/benchmarks/reset-target.sh

      - name: GenAI framework scan
        if: ${{ env.OPENAI_API_KEY != '' }}
        run: |
          mkdir -p fw-out
          docker run --rm --network host -e OPENAI_API_KEY \
            -v "$PWD/fw-out":/work "$FRAMEWORK_IMAGE" \
            --target "$TARGET" --mode vulnerable --out /work

      - name: Score framework
        if: ${{ env.OPENAI_API_KEY != '' }}
        run: |
          python3 .framework/scoring/score.py --tool framework --mode vulnerable \
            fw-out/findings.json --json > fw-vuln.json
          cat fw-vuln.json

      # ---------- Report ----------
      - name: Publish comparison to job summary
        if: always()
        run: |
          python3 - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          def load(p):
              try: return json.load(open(p))
              except Exception: return None
          rows = {"OWASP ZAP": load("zap-vuln.json"), "GenAI framework": load("fw-vuln.json")}
          print("## API Security Scan — live local VAMPI (self-hosted runner)\n")
          print("| Tool | Instances | TP | FN | FP | Recall | Precision | F1 |")
          print("|------|-----------|----|----|----|--------|-----------|----|")
          for label, r in rows.items():
              if r:
                  print(f"| {label} | {r['present_instances']} | {r['TP']} | {r['FN']} | "
                        f"{r['FP']} | {r['recall']} | {r['precision']} | {r['f1']} |")
              else:
                  print(f"| {label} | _not run_ |  |  |  |  |  |  |")
          if not rows["GenAI framework"]:
              print("\n> GenAI framework skipped — set the `OPENAI_API_KEY` repo secret to enable it.")
          PY

      - name: Upload scan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-results
          path: |
            zap-vuln.json
            fw-vuln.json
            fw-out/**
            .framework/results/zap/
          retention-days: 30
