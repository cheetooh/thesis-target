name: API Security Scan

# Thesis demo: a developer commits to the VAMPI project and GitHub Actions runs
# DAST against the running API, comparing two tools:
#   - BASELINE : OWASP ZAP api-scan
#   - FRAMEWORK: GenAI DAST framework (GHCR image, gated on the OPENAI_API_KEY secret)
#   - SCORING  : recall / precision / F1 vs the VAMPI ground truth (both modes)
#
# Harness, ground truth and scoring live in the companion `thesis-framework`
# repo (the product), checked out here at .framework.

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: read

env:
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  FRAMEWORK_IMAGE: ghcr.io/${{ github.repository_owner }}/thesis-framework:latest

jobs:
  api-security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target (VAMPI)
        uses: actions/checkout@v4

      - name: Checkout thesis-framework (harness + scoring)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/thesis-framework
          path: .framework
          token: ${{ secrets.FRAMEWORK_TOKEN || github.token }}

      - name: Build & start VAMPI (vulnerable :5002, secure :5001)
        run: |
          docker compose up -d --build
          for port in 5001 5002; do
            echo "waiting for VAMPI on :$port ..."
            for i in $(seq 1 40); do
              curl -sf "http://localhost:$port/" >/dev/null && break
              sleep 1
            done
            curl -sf "http://localhost:$port/createdb" && echo " db seeded on :$port"
          done

      # ---------- BASELINE: OWASP ZAP ----------
      - name: OWASP ZAP baseline scan (vulnerable + secure)
        run: |
          chmod +x .framework/benchmarks/zap/run-zap-scan.sh
          .framework/benchmarks/zap/run-zap-scan.sh \
            vampi-vuln   http://localhost:5002/openapi.json host http://localhost:5002
          .framework/benchmarks/zap/run-zap-scan.sh \
            vampi-secure http://localhost:5001/openapi.json host http://localhost:5001

      - name: Score ZAP
        run: |
          python3 .framework/scoring/score.py --tool zap --mode vulnerable \
            .framework/results/zap/vampi-vuln-latest/report.json --json > zap-vuln.json
          python3 .framework/scoring/score.py --tool zap --mode secure \
            .framework/results/zap/vampi-secure-latest/report.json --json > zap-secure.json
          cat zap-vuln.json zap-secure.json

      # ---------- FRAMEWORK: GenAI DAST (gated on the OpenAI key) ----------
      # Build the framework image from the checked-out thesis-framework repo.
      # (If/when the image is published to GHCR, swap this for a docker pull of
      #  $FRAMEWORK_IMAGE.)
      - name: Build GenAI framework image
        if: ${{ env.OPENAI_API_KEY != '' }}
        run: docker build -t genai-dast:ci .framework/framework

      - name: GenAI framework scan (vulnerable + secure)
        if: ${{ env.OPENAI_API_KEY != '' }}
        run: |
          mkdir -p fw-out/vuln fw-out/secure
          docker run --rm --network host -e OPENAI_API_KEY \
            -v "$PWD/fw-out/vuln":/work genai-dast:ci \
            --target http://localhost:5002 --mode vulnerable --out /work
          docker run --rm --network host -e OPENAI_API_KEY \
            -v "$PWD/fw-out/secure":/work genai-dast:ci \
            --target http://localhost:5001 --mode secure --out /work

      - name: Score framework
        if: ${{ env.OPENAI_API_KEY != '' }}
        run: |
          python3 .framework/scoring/score.py --tool framework --mode vulnerable \
            fw-out/vuln/findings.json --json > fw-vuln.json
          python3 .framework/scoring/score.py --tool framework --mode secure \
            fw-out/secure/findings.json --json > fw-secure.json
          cat fw-vuln.json fw-secure.json

      # ---------- Report ----------
      - name: Publish comparison to job summary
        if: always()
        run: |
          python3 - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json, os
          def load(p):
              try: return json.load(open(p))
              except Exception: return None
          rows = {
              "ZAP (vulnerable)":       load("zap-vuln.json"),
              "ZAP (secure)":           load("zap-secure.json"),
              "Framework (vulnerable)": load("fw-vuln.json"),
              "Framework (secure)":     load("fw-secure.json"),
          }
          print("## API Security Scan — GenAI framework vs OWASP ZAP\n")
          print("| Tool / mode | Instances | TP | FN | FP | Recall | Precision | F1 |")
          print("|-------------|-----------|----|----|----|--------|-----------|----|")
          for label, r in rows.items():
              if r:
                  print(f"| {label} | {r['present_instances']} | {r['TP']} | {r['FN']} | "
                        f"{r['FP']} | {r['recall']} | {r['precision']} | {r['f1']} |")
              else:
                  print(f"| {label} | _not run_ |  |  |  |  |  |  |")
          fw = rows["Framework (vulnerable)"]
          if not fw:
              print("\n> GenAI framework step skipped — set the `OPENAI_API_KEY` repo secret to enable it.")
          PY

      - name: Upload scan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-results
          path: |
            zap-*.json
            fw-*.json
            fw-out/**
            .framework/results/zap/
          retention-days: 30
